# =============================================================================
# CLIF — PC2 Compute & Presentation Tier (Right-Sized for 6C/12T, 16 GB)
# =============================================================================
# Runs: Vector, Triage Agent ×2, LanceDB, Merkle, Redpanda Console,
#       Prometheus, Grafana
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  Resource Budget                                                       │
# │  CPUs:  11.5 / 12 logical cores                                       │
# │  RAM:   10.3G limits / 4.3G reservations (16 GB available)            │
# │  Headroom: ~5.7 GB free for OS + Docker daemon                        │
# │                                                                        │
# │  DATA FLOW: Logs → Vector → [LAN] → PC1 Redpanda                     │
# │             Only 1 LAN hop on the ingestion hot path.                  │
# └─────────────────────────────────────────────────────────────────────────┘
#
# Usage:
#   # First run setup (use PC1's LAN IP):
#   .\cluster\setup.ps1 -Role pc2 -DataIP 192.168.1.100
#
#   # Start (core services):
#   docker compose -f docker-compose.pc2.yml --env-file .env --env-file cluster\.env up -d
#
#   # Start (with LanceDB semantic search):
#   docker compose -f docker-compose.pc2.yml --env-file .env --env-file cluster\.env --profile full up -d
#
#   # Status:
#   docker compose -f docker-compose.pc2.yml ps
#
#   # Stop:
#   docker compose -f docker-compose.pc2.yml down
# =============================================================================
# IMPORTANT: Set DATA_IP in cluster/.env to PC1's LAN IP first!
# Also run:  cd dashboard && npm run dev   (Next.js dashboard is not Dockerized)
# =============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

# ── PC1 host-alias anchor (reused by all services needing data tier) ────────
# Resolves ClickHouse / MinIO Docker hostnames to PC1's LAN IP inside containers
# so configs/healthchecks that use container hostnames work unchanged.
x-pc1-hosts: &pc1-hosts
  extra_hosts:
    - "clickhouse01:${DATA_IP}"
    - "clickhouse02:${DATA_IP}"
    - "clickhouse-keeper:${DATA_IP}"
    - "minio1:${DATA_IP}"

networks:
  clif-frontend:
    driver: bridge
  clif-backend:
    driver: bridge

volumes:
  vector_data:
  lancedb_data:
  prometheus_data:
  grafana_data:

services:

  # =========================================================================
  # Vector — Log Aggregation & CCS Normalization Pipeline
  # =========================================================================
  # Collects logs from syslog, HTTP, TCP NDJSON, Docker, files, journald.
  # Normalizes all events to CLIF Common Schema (CCS) via VRL transforms.
  # Routes classified events to Redpanda on PC1 via external Kafka listener.
  #
  # Fault-tolerant producer: acks=all, enable.idempotence=true,
  # when_full=block, 10 retries with exponential backoff.
  # =========================================================================
  clif-vector:
    build:
      context: ./vector
      dockerfile: Dockerfile
      target: development
    container_name: clif-vector
    hostname: clif-vector
    <<: *pc1-hosts
    ports:
      - "${VECTOR_SYSLOG_PORT:-1514}:1514"       # Syslog TCP+UDP
      - "${VECTOR_SYSLOG_PORT:-1514}:1514/udp"   # Syslog UDP
      - "${VECTOR_API_PORT:-8686}:8686"           # Vector API
      - "${VECTOR_HTTP_PORT:-8687}:8687"          # HTTP JSON ingest
      - "9514:9514"                                # TCP NDJSON (high-throughput)
      - "${VECTOR_STATSD_PORT:-8125}:8125/udp"   # StatsD metrics
      - "${VECTOR_PROM_PORT:-9598}:9598"          # Prometheus exporter
    environment:
      # ── Kafka brokers via PC1 external listeners ──
      VECTOR_KAFKA_BROKERS: "${DATA_IP}:19092,${DATA_IP}:29092,${DATA_IP}:39092"
      VECTOR_LOG: ${VECTOR_LOG_LEVEL:-info}
      VECTOR_THREADS: ${VECTOR_THREADS:-5}
    volumes:
      - vector_data:/var/lib/vector
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log/host:ro
    networks:
      - clif-backend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8686/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '5'
          memory: 3G
        reservations:
          cpus: '2'
          memory: 1536M

  # =========================================================================
  # Redpanda Console (web UI — connects to PC1 brokers)
  # =========================================================================
  redpanda-console:
    image: redpandadata/console:v2.7.2
    container_name: clif-redpanda-console
    hostname: redpanda-console
    extra_hosts:
      - "pc1-rp01:${DATA_IP}"
      - "pc1-rp02:${DATA_IP}"
      - "pc1-rp03:${DATA_IP}"
    ports:
      - "8080:8080"
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
    volumes:
      - ./cluster/redpanda/console-config.yml:/tmp/config.yml:ro
    networks:
      - clif-frontend
      - clif-backend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/admin/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # =========================================================================
  # Merkle Evidence Chain Service
  # =========================================================================
  clif-merkle:
    build:
      context: ./merkle-service
      dockerfile: Dockerfile
    container_name: clif-merkle
    hostname: clif-merkle
    <<: *pc1-hosts
    environment:
      CLICKHOUSE_HOST: ${DATA_IP}
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clif_admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clif_secure_password_change_me}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-clif_logs}
      MINIO_ENDPOINT: "http://${DATA_IP}:${MINIO_DATA_PORT:-9002}"
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-clif_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-clif_minio_secret_change_me}
      MINIO_BUCKET_EVIDENCE: ${MINIO_BUCKET_EVIDENCE:-clif-evidence-archive}
      MERKLE_BATCH_WINDOW: ${MERKLE_BATCH_WINDOW:-1800}
      MERKLE_DAEMON_INTERVAL: ${MERKLE_DAEMON_INTERVAL:-30}
      LOG_LEVEL: INFO
    networks:
      - clif-backend
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"clickhouse01\",9000)); s.close()' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  # =========================================================================
  # LanceDB — Semantic Vector Search & RAG Engine
  # Enabled with: --profile full
  # =========================================================================
  lancedb:
    container_name: clif-lancedb
    profiles: [full]
    build:
      context: ./lancedb-service
      dockerfile: Dockerfile
    <<: *pc1-hosts
    environment:
      LANCEDB_PATH: /data/lancedb
      EMBEDDING_MODEL: all-MiniLM-L6-v2
      EMBEDDING_BATCH_SIZE: 256
      EMBEDDING_DIM: 384
      CLICKHOUSE_HOST: ${DATA_IP}
      CLICKHOUSE_PORT: ${CLICKHOUSE_NATIVE_PORT:-9000}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clif_admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clif_secure_password_change_me}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-clif_logs}
      SYNC_INTERVAL_SEC: 30
      SYNC_BATCH_SIZE: 1000
      API_HOST: 0.0.0.0
      API_PORT: 8100
      LOG_LEVEL: INFO
      CORS_ORIGINS: "http://localhost:3001,http://clif-dashboard:3001"
    ports:
      - "8100:8100"
    volumes:
      - lancedb_data:/data/lancedb
    networks:
      - clif-backend
      - clif-frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8100/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 768M

  # =========================================================================
  # Triage Agent 1 — 3-Model ML Ensemble (LightGBM ONNX + EIF + River ARF)
  # =========================================================================
  # Consumes: raw-logs, security-events, process-events, network-events (PC1)
  # Produces: triage-scores, anomaly-alerts (PC1)
  # Writes:   ClickHouse arf_replay_buffer (PC1)
  # =========================================================================
  clif-triage-agent:
    container_name: clif-triage-agent
    build:
      context: ./agents/triage
      dockerfile: Dockerfile
    <<: *pc1-hosts
    environment:
      # ── Redpanda connectivity (PC1 external listeners) ──
      KAFKA_BROKERS: "${DATA_IP}:19092,${DATA_IP}:29092,${DATA_IP}:39092"
      CONSUMER_GROUP_ID: "clif-triage-agent"
      # ── Input topics ──
      INPUT_TOPICS: "raw-logs,security-events,process-events,network-events"
      # ── Output topics ──
      TOPIC_TEMPLATED_LOGS: "templated-logs"
      TOPIC_TRIAGE_SCORES: "triage-scores"
      TOPIC_ANOMALY_ALERTS: "anomaly-alerts"
      TOPIC_HUNTER_TASKS: "hunter-tasks"
      TOPIC_DEAD_LETTER: "dead-letter"
      # ── ClickHouse (PC1 via extra_hosts) ──
      CLICKHOUSE_HOST: ${DATA_IP}
      CLICKHOUSE_PORT: ${CLICKHOUSE_NATIVE_PORT:-9000}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clif_admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clif_secure_password_change_me}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-clif_logs}
      # ── Drain3 configuration ──
      DRAIN3_DEPTH: 4
      DRAIN3_SIM_TH: 0.4
      DRAIN3_MAX_CHILDREN: 100
      DRAIN3_MAX_CLUSTERS: 1024
      DRAIN3_CONFIG_PATH: /app/drain3.ini
      DRAIN3_STATE_PATH: /app/drain3_state.bin
      # ── ML model paths ──
      MODEL_DIR: /models
      MODEL_LGBM_PATH: /models/lgbm_v2.0.0.onnx
      MODEL_EIF_PATH: /models/eif_v2.0.0.pkl
      MODEL_EIF_THRESHOLD_PATH: /models/eif_threshold.npy
      MODEL_EIF_CALIBRATION_PATH: /models/eif_calibration.npz
      MODEL_ARF_CHECKPOINT: /models/arf_v2.0.0.pkl
      FEATURE_COLS_PATH: /models/feature_cols.pkl
      MANIFEST_PATH: /models/manifest.json
      # ── Scoring (v5 — LGBM-dominant, 2026-03-05) ──
      SCORE_WEIGHTS: "lgbm=0.80,eif=0.12,arf=0.08"
      DEFAULT_SUSPICIOUS_THRESHOLD: "0.35"
      DEFAULT_ANOMALOUS_THRESHOLD: "0.78"
      DISAGREEMENT_THRESHOLD: "0.30"
      FEATURE_STALENESS_TIMEOUT_SEC: "300"
      EIF_ANOMALY_OVERRIDE_THRESHOLD: "0.65"
      EIF_ANOMALY_OVERRIDE_FLOOR: "0.45"
      # ── Performance (right-sized for 2 CPU) ──
      BATCH_SIZE: "500"
      INFERENCE_WORKERS: "2"
      CONN_TIME_WINDOW_SEC: "2.0"
      CONN_HOST_WINDOW_SIZE: "100"
      # ── ARF Warm Restart ──
      ARF_WARM_RESTART: "true"
      ARF_REPLAY_HOURS: "24"
      ARF_REPLAY_MAX_ROWS: "50000"
      ARF_STREAM_CSV_PATH: "/models/features_arf_stream_features.csv"
      ARF_N_MODELS: "10"
      ARF_ADWIN_DELTA: "0.002"
      ARF_ADWIN_WARNING_DELTA: "0.01"
      ARF_SEED: "42"
      ARF_CONFIDENCE_RAMP_SAMPLES: "10000"
      ARF_LABEL_SOURCE: "lgbm_pseudo"
      ARF_PSEUDO_LABEL_HIGH: "0.80"
      ARF_PSEUDO_LABEL_LOW: "0.20"
      # ── Health / Self-test ──
      SELFTEST_ENABLED: "true"
      STARTUP_HEALTH_RETRIES: "30"
      STARTUP_HEALTH_DELAY_SEC: "2.0"
      LOG_LEVEL: INFO
    volumes:
      - ./agents/triage/models:/models:ro
    ports:
      - "8300:8300"
    networks:
      - clif-backend
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8300/health')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 768M

  # =========================================================================
  # Triage Agent 2 — Horizontal scaling (same consumer group)
  # 48 topic-partitions / 2 agents = 24 partitions each
  # =========================================================================
  clif-triage-agent-2:
    container_name: clif-triage-agent-2
    hostname: clif-triage-agent-2
    build:
      context: ./agents/triage
      dockerfile: Dockerfile
    <<: *pc1-hosts
    environment:
      KAFKA_BROKERS: "${DATA_IP}:19092,${DATA_IP}:29092,${DATA_IP}:39092"
      CONSUMER_GROUP_ID: "clif-triage-agent"
      INPUT_TOPICS: "raw-logs,security-events,process-events,network-events"
      TOPIC_TEMPLATED_LOGS: "templated-logs"
      TOPIC_TRIAGE_SCORES: "triage-scores"
      TOPIC_ANOMALY_ALERTS: "anomaly-alerts"
      TOPIC_HUNTER_TASKS: "hunter-tasks"
      TOPIC_DEAD_LETTER: "dead-letter"
      CLICKHOUSE_HOST: ${DATA_IP}
      CLICKHOUSE_PORT: ${CLICKHOUSE_NATIVE_PORT:-9000}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clif_admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clif_secure_password_change_me}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-clif_logs}
      DRAIN3_DEPTH: 4
      DRAIN3_SIM_TH: 0.4
      DRAIN3_MAX_CHILDREN: 100
      DRAIN3_MAX_CLUSTERS: 1024
      DRAIN3_CONFIG_PATH: /app/drain3.ini
      DRAIN3_STATE_PATH: /app/drain3_state.bin
      MODEL_DIR: /models
      MODEL_LGBM_PATH: /models/lgbm_v2.0.0.onnx
      MODEL_EIF_PATH: /models/eif_v2.0.0.pkl
      MODEL_EIF_THRESHOLD_PATH: /models/eif_threshold.npy
      MODEL_EIF_CALIBRATION_PATH: /models/eif_calibration.npz
      MODEL_ARF_CHECKPOINT: /models/arf_v2.0.0.pkl
      FEATURE_COLS_PATH: /models/feature_cols.pkl
      MANIFEST_PATH: /models/manifest.json
      SCORE_WEIGHTS: "lgbm=0.80,eif=0.12,arf=0.08"
      DEFAULT_SUSPICIOUS_THRESHOLD: "0.35"
      DEFAULT_ANOMALOUS_THRESHOLD: "0.78"
      DISAGREEMENT_THRESHOLD: "0.30"
      FEATURE_STALENESS_TIMEOUT_SEC: "300"
      EIF_ANOMALY_OVERRIDE_THRESHOLD: "0.65"
      EIF_ANOMALY_OVERRIDE_FLOOR: "0.45"
      BATCH_SIZE: "500"
      INFERENCE_WORKERS: "2"
      CONN_TIME_WINDOW_SEC: "2.0"
      CONN_HOST_WINDOW_SIZE: "100"
      ARF_WARM_RESTART: "true"
      ARF_REPLAY_HOURS: "24"
      ARF_REPLAY_MAX_ROWS: "50000"
      ARF_STREAM_CSV_PATH: "/models/features_arf_stream_features.csv"
      ARF_N_MODELS: "10"
      ARF_ADWIN_DELTA: "0.002"
      ARF_ADWIN_WARNING_DELTA: "0.01"
      ARF_SEED: "42"
      ARF_CONFIDENCE_RAMP_SAMPLES: "10000"
      ARF_LABEL_SOURCE: "lgbm_pseudo"
      ARF_PSEUDO_LABEL_HIGH: "0.80"
      ARF_PSEUDO_LABEL_LOW: "0.20"
      SELFTEST_ENABLED: "true"
      STARTUP_HEALTH_RETRIES: "30"
      STARTUP_HEALTH_DELAY_SEC: "2.0"
      LOG_LEVEL: INFO
    volumes:
      - ./agents/triage/models:/models:ro
    ports:
      - "8301:8300"
    networks:
      - clif-backend
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8300/health')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 768M

  # =========================================================================
  # Prometheus (scrapes both PC1 data tier & PC2 compute tier)
  # =========================================================================
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: clif-prometheus
    hostname: prometheus
    extra_hosts:
      - "clickhouse01:${DATA_IP}"
      - "clickhouse02:${DATA_IP}"
      - "clickhouse-keeper:${DATA_IP}"
      - "minio1:${DATA_IP}"
      - "redpanda01:${DATA_IP}"
      - "redpanda02:${DATA_IP}"
      - "redpanda03:${DATA_IP}"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./cluster/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    networks:
      - clif-frontend
      - clif-backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 256M

  # =========================================================================
  # Grafana (dashboards — view from any browser on LAN)
  # =========================================================================
  grafana:
    image: grafana/grafana:11.1.4
    container_name: clif-grafana
    hostname: grafana
    extra_hosts:
      - "clickhouse01:${DATA_IP}"
    ports:
      - "${GRAFANA_PORT:-3002}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-clif_grafana_change_me}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/clif-overview.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/clif-overview.json:ro
      - ./cluster/monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./monitoring/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
    networks:
      - clif-frontend
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
