# =============================================================================
# CLIF Pipeline v2 — Full Production Path (Vector → Redpanda → Consumer → CH)
# =============================================================================
#
# Architecture:
#   Vector (6 cores) → Redpanda (2 cores) → Consumer (2 cores) → ClickHouse
#   Full E2E path: NO bypass. All events flow through Kafka.
#
# Resource budget (12 logical CPUs, 16 GB RAM):
#   Vector 3G + Keeper 512M + CH01 2G + CH02 1G + RP 2G + Consumer 1G ≈ 9.5G
#   Leaves ~6.5G for Windows/WSL2 + load generator
#   CPU: 6 + 0.25 + 1.5 + 0.25 + 2 + 2 = 12 (zero oversubscription)
#
# Usage:
#   docker compose -f docker-compose.eps-test.yml up -d
#   docker compose -f docker-compose.eps-test.yml down -v
# =============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "3"

networks:
  clif-frontend:
    driver: bridge
  clif-backend:
    driver: bridge
  clif-storage:
    driver: bridge

volumes:
  clickhouse01_data:
  clickhouse02_data:
  clickhouse_keeper_data:
  redpanda01_data:
  vector_data:

# ── Services ─────────────────────────────────────────────────────────────────
services:

  # =========================================================================
  # ClickHouse Keeper (required for ReplicatedMergeTree)
  # =========================================================================
  clickhouse-keeper:
    image: clickhouse/clickhouse-keeper:24.8
    container_name: clif-clickhouse-keeper
    hostname: clickhouse-keeper
    ports:
      - "${ZOOKEEPER_PORT:-12181}:2181"
    volumes:
      - clickhouse_keeper_data:/var/lib/clickhouse-keeper
      - ./clickhouse/keeper_config.xml:/etc/clickhouse-keeper/keeper_config.xml:ro
    networks:
      - clif-storage
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-keeper-client -h localhost -p 2181 -q 'ruok' | grep -q imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 256M

  # =========================================================================
  # ClickHouse Node 1 (shard_01 / replica_01) — PRIMARY write target
  # Consumer batch-inserts here via native TCP :9000
  # =========================================================================
  clickhouse01:
    image: clickhouse/clickhouse-server:24.8
    container_name: clif-clickhouse01
    hostname: clickhouse01
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clif_admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-Cl1f_Ch@ngeM3_2026!}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-clif_logs}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse01_data:/var/lib/clickhouse
      - ./clickhouse/node01_config.xml:/etc/clickhouse-server/config.d/clusters.xml:ro
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/users.xml:ro
      - ./clickhouse/storage_policy_local.xml:/etc/clickhouse-server/config.d/storage_policy.xml:ro
      - ./clickhouse/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    depends_on:
      clickhouse-keeper:
        condition: service_healthy
    networks:
      - clif-backend
      - clif-storage
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user ${CLICKHOUSE_USER:-clif_admin} --password ${CLICKHOUSE_PASSWORD:-Cl1f_Ch@ngeM3_2026!} --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # =========================================================================
  # ClickHouse Node 2 (shard_01 / replica_02) — read replica
  # Replicates asynchronously from Node 1 via ReplicatedMergeTree
  # =========================================================================
  clickhouse02:
    image: clickhouse/clickhouse-server:24.8
    container_name: clif-clickhouse02
    hostname: clickhouse02
    ports:
      - "8124:8123"
      - "9001:9000"
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clif_admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-Cl1f_Ch@ngeM3_2026!}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-clif_logs}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse02_data:/var/lib/clickhouse
      - ./clickhouse/node02_config.xml:/etc/clickhouse-server/config.d/clusters.xml:ro
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/users.xml:ro
      - ./clickhouse/storage_policy_local.xml:/etc/clickhouse-server/config.d/storage_policy.xml:ro
      - ./clickhouse/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    depends_on:
      clickhouse-keeper:
        condition: service_healthy
    networks:
      - clif-backend
      - clif-storage
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user ${CLICKHOUSE_USER:-clif_admin} --password ${CLICKHOUSE_PASSWORD:-Cl1f_Ch@ngeM3_2026!} --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1536M
        reservations:
          cpus: '0.25'
          memory: 768M

  # =========================================================================
  # Redpanda Broker (single broker — main ingestion bus)
  # All 4 event types flow through: Vector → Redpanda → Consumer → CH
  # =========================================================================
  redpanda01:
    image: redpandadata/redpanda:v24.2.8
    container_name: clif-redpanda01
    hostname: redpanda01
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda01:9092,external://localhost:19092
      - --rpc-addr 0.0.0.0:33145
      - --advertise-rpc-addr redpanda01:33145
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda01:8082,external://localhost:18082
      - --smp 2
      - --memory 1500M
      - --reserve-memory 200M
      - --default-log-level=warn
      - --seeds redpanda01:33145
    ports:
      - "19092:19092"
      - "18082:18082"
      - "${REDPANDA_ADMIN_PORT:-9644}:9644"
    volumes:
      - redpanda01_data:/var/lib/redpanda/data
    networks:
      - clif-backend
      - clif-storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9644/v1/status/ready || rpk brokers list | grep -q '9092'"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # =========================================================================
  # Redpanda topic initialiser (RF=1 — all ingestion + AI pipeline topics)
  # =========================================================================
  redpanda-init:
    image: redpandadata/redpanda:v24.2.8
    container_name: clif-redpanda-init
    depends_on:
      redpanda01:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        BROKER="redpanda01:9092"
        PARTITIONS=$${REDPANDA_PARTITIONS:-12}
        RF=1
        RETENTION=$${REDPANDA_LOG_RETENTION_MS:-604800000}
        AGENT_P=$$(( PARTITIONS / 2 ))
        [ "$$AGENT_P" -lt 3 ] && AGENT_P=3

        echo "── Creating ingestion topics ($$PARTITIONS partitions, RF=$$RF) ──"
        for TOPIC in raw-logs security-events process-events network-events; do
          rpk topic create "$$TOPIC" \
            --brokers "$$BROKER" \
            --partitions "$$PARTITIONS" \
            --replicas "$$RF" \
            --topic-config retention.ms="$$RETENTION" \
            --topic-config cleanup.policy=delete \
            --topic-config compression.type=producer \
            --topic-config max.message.bytes=10485760 || true
          echo "  ✔ topic $$TOPIC ready"
        done

        echo "── Creating triage pipeline topics ($$PARTITIONS partitions) ──"
        for TOPIC in templated-logs triage-scores anomaly-alerts; do
          rpk topic create "$$TOPIC" \
            --brokers "$$BROKER" \
            --partitions "$$PARTITIONS" \
            --replicas "$$RF" \
            --topic-config retention.ms="$$RETENTION" \
            --topic-config cleanup.policy=delete \
            --topic-config compression.type=producer \
            --topic-config max.message.bytes=10485760 || true
          echo "  ✔ topic $$TOPIC ready"
        done

        echo "── Creating agent pipeline topics ($$AGENT_P partitions) ──"
        for TOPIC in hunter-tasks hunter-results verifier-tasks verifier-results; do
          rpk topic create "$$TOPIC" \
            --brokers "$$BROKER" \
            --partitions "$$AGENT_P" \
            --replicas "$$RF" \
            --topic-config retention.ms="$$RETENTION" \
            --topic-config cleanup.policy=delete \
            --topic-config compression.type=producer \
            --topic-config max.message.bytes=10485760 || true
          echo "  ✔ topic $$TOPIC ready"
        done

        echo "── Creating operational topics (3 partitions) ──"
        for TOPIC in feedback-labels dead-letter pipeline-commands; do
          rpk topic create "$$TOPIC" \
            --brokers "$$BROKER" \
            --partitions 3 \
            --replicas "$$RF" \
            --topic-config retention.ms="$$((RETENTION * 4))" \
            --topic-config cleanup.policy=delete \
            --topic-config compression.type=producer \
            --topic-config max.message.bytes=10485760 || true
          echo "  ✔ topic $$TOPIC ready"
        done

        rpk topic list --brokers "$$BROKER"
        echo "All CLIF topics initialised (15 topics — 4 ingestion + 11 pipeline)."
    environment:
      REDPANDA_PARTITIONS: ${REDPANDA_PARTITIONS:-12}
      REDPANDA_LOG_RETENTION_MS: ${REDPANDA_LOG_RETENTION_MS:-604800000}
    networks:
      - clif-backend

  # =========================================================================
  # Vector — Log Pipeline (6 threads, 3G RAM, Kafka sinks → Redpanda)
  # =========================================================================
  clif-vector:
    build:
      context: ./vector
      dockerfile: Dockerfile
      target: development
    container_name: clif-vector
    hostname: clif-vector
    ports:
      - "${VECTOR_SYSLOG_PORT:-1514}:1514"
      - "${VECTOR_SYSLOG_PORT:-1514}:1514/udp"
      - "${VECTOR_API_PORT:-8686}:8686"
      - "${VECTOR_HTTP_PORT:-8687}:8687"
      - "${VECTOR_TCP_JSON_PORT:-9514}:9514"
      - "${VECTOR_STATSD_PORT:-8125}:8125/udp"
      - "${VECTOR_PROM_PORT:-9598}:9598"
    environment:
      # ── Kafka sinks (all events route through Redpanda) ──
      VECTOR_KAFKA_BROKERS: redpanda01:9092
      # ── Vector runtime ──
      VECTOR_LOG: ${VECTOR_LOG_LEVEL:-info}
      VECTOR_THREADS: ${VECTOR_THREADS:-6}
    volumes:
      - vector_data:/var/lib/vector
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log/host:ro
    depends_on:
      redpanda01:
        condition: service_healthy
    networks:
      - clif-backend
      - clif-storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8686/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '6'
          memory: 3G
        reservations:
          cpus: '3'
          memory: 1536M

  # =========================================================================
  # Consumer (Full Ingestion — all 4 event types from Redpanda → ClickHouse)
  # Production path: Vector → Redpanda → Consumer → ClickHouse
  # =========================================================================
  clif-consumer:
    build:
      context: ./consumer
      dockerfile: Dockerfile
    container_name: clif-consumer
    hostname: clif-consumer
    environment:
      KAFKA_BROKERS: redpanda01:9092
      CLICKHOUSE_HOST: clickhouse01
      CLICKHOUSE_ALT_HOSTS: clickhouse02:9000
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clif_admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-Cl1f_Ch@ngeM3_2026!}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-clif_logs}
      CONSUMER_GROUP_ID: ${CONSUMER_GROUP_ID:-clif-clickhouse-consumer}
      CONSUMER_BATCH_SIZE: ${CONSUMER_BATCH_SIZE:-500000}
      CONSUMER_FLUSH_INTERVAL_SEC: ${CONSUMER_FLUSH_INTERVAL_SEC:-0.3}
      CONSUMER_MAX_RETRIES: ${CONSUMER_MAX_RETRIES:-5}
      CONSUMER_POLL_BATCH: ${CONSUMER_POLL_BATCH:-50000}
      CONSUMER_FLUSH_WORKERS: ${CONSUMER_FLUSH_WORKERS:-6}
      LOG_LEVEL: INFO
    depends_on:
      clickhouse01:
        condition: service_healthy
      redpanda01:
        condition: service_healthy
    networks:
      - clif-backend
      - clif-storage
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"clickhouse01\",9000)); s.close()' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
