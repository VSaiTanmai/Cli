# =============================================================================
# CLIF Lightweight Docker Compose — Laptop Testing (7.6GB Docker RAM)
# =============================================================================
# Single-node ClickHouse + single Redpanda + 1 consumer + 1 triage + 1 hunter
# Total memory budget: ~4.4GB (leaves ~3GB for Docker/OS overhead)
#
# Usage:
#   docker compose -f docker-compose-light.yml up -d
#   docker compose -f docker-compose-light.yml down -v   (destroy everything)
# =============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "3"

networks:
  clif-net:
    driver: bridge

volumes:
  clickhouse_data:
  clickhouse_keeper_data:
  redpanda_data:
  vector_data:
  hunter_models:
  lancedb_data:

services:

  # ─── ClickHouse Keeper (single-node) ────────────────────────────────────
  clickhouse-keeper:
    image: clickhouse/clickhouse-keeper:24.8
    container_name: clif-clickhouse-keeper
    hostname: clickhouse-keeper
    volumes:
      - clickhouse_keeper_data:/var/lib/clickhouse-keeper
      - ./clickhouse/keeper_config.xml:/etc/clickhouse-keeper/keeper_config.xml:ro
    networks:
      - clif-net
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-keeper-client -h localhost -p 2181 -q 'ruok' | grep -q imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 200M

  # ─── ClickHouse (single node, local storage policy) ─────────────────────
  clickhouse01:
    image: clickhouse/clickhouse-server:24.8
    container_name: clif-clickhouse01
    hostname: clickhouse01
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clif_admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clif_secure_password_change_me}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-clif_logs}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/node01_config_single.xml:/etc/clickhouse-server/config.d/clusters.xml:ro
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/users.xml:ro
      - ./clickhouse/storage_policy_local.xml:/etc/clickhouse-server/config.d/storage_policy.xml:ro
      - ./clickhouse/schema_local.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    depends_on:
      clickhouse-keeper:
        condition: service_healthy
    networks:
      - clif-net
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user ${CLICKHOUSE_USER:-clif_admin} --password ${CLICKHOUSE_PASSWORD:-clif_secure_password_change_me} --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    deploy:
      resources:
        limits:
          memory: 1G

  # ─── Redpanda (single broker, laptop-tuned) ─────────────────────────────
  redpanda01:
    image: redpandadata/redpanda:v24.2.8
    container_name: clif-redpanda01
    hostname: redpanda01
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda01:9092,external://localhost:19092
      - --rpc-addr 0.0.0.0:33145
      - --advertise-rpc-addr redpanda01:33145
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda01:8082,external://localhost:18082
      - --smp 1
      - --memory 700M
      - --reserve-memory 100M
      - --default-log-level=warn
      - --overprovisioned
      - --unsafe-bypass-fsync=true
      - --lock-memory=false
      - --seeds redpanda01:33145
    ports:
      - "19092:19092"
      - "18082:18082"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks:
      - clif-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9644/v1/status/ready || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 900M

  # ─── Redpanda topic init (runs once, exits) ─────────────────────────────
  redpanda-init:
    image: redpandadata/redpanda:v24.2.8
    container_name: clif-redpanda-init
    depends_on:
      redpanda01:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        BROKER="redpanda01:9092"
        echo "Creating CLIF topics (single broker, RF=1)..."

        for TOPIC in raw-logs security-events process-events network-events \
                     templated-logs triage-scores anomaly-alerts \
                     hunter-tasks hunter-results verifier-tasks verifier-results \
                     feedback-labels dead-letter pipeline-commands; do
          rpk topic create "$$TOPIC" \
            --brokers "$$BROKER" \
            --partitions 3 \
            --replicas 1 \
            --topic-config retention.ms=604800000 \
            --topic-config cleanup.policy=delete \
            --topic-config compression.type=producer \
            --topic-config max.message.bytes=10485760 || true
          echo "  topic $$TOPIC ready"
        done

        rpk topic list --brokers "$$BROKER"
        echo "All 14 CLIF topics created."
    networks:
      - clif-net

  # ─── Consumer (Redpanda → ClickHouse) ───────────────────────────────────
  clif-consumer:
    build:
      context: ./consumer
      dockerfile: Dockerfile
    container_name: clif-consumer
    hostname: clif-consumer
    environment:
      KAFKA_BROKERS: redpanda01:9092
      CLICKHOUSE_HOST: clickhouse01
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clif_admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clif_secure_password_change_me}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-clif_logs}
      CONSUMER_GROUP_ID: clif-clickhouse-consumer
      CONSUMER_BATCH_SIZE: 50000
      CONSUMER_FLUSH_INTERVAL_SEC: 1.0
      CONSUMER_MAX_RETRIES: 5
      CONSUMER_POLL_BATCH: 5000
      CONSUMER_FLUSH_WORKERS: 2
      LOG_LEVEL: INFO
    depends_on:
      clickhouse01:
        condition: service_healthy
      redpanda01:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    networks:
      - clif-net
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"clickhouse01\",9000)); s.close()' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M

  # ─── Vector (log aggregation + CCS normalisation) ───────────────────────
  clif-vector:
    build:
      context: ./vector
      dockerfile: Dockerfile
      target: development
    container_name: clif-vector
    hostname: clif-vector
    ports:
      - "1514:1514"
      - "1514:1514/udp"
      - "8686:8686"
      - "8687:8687"
      - "9514:9514"
    environment:
      VECTOR_KAFKA_BROKERS: redpanda01:9092
      VECTOR_LOG: info
      VECTOR_THREADS: 2
    volumes:
      - vector_data:/var/lib/vector
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      redpanda01:
        condition: service_healthy
    networks:
      - clif-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8686/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M

  # ─── Triage Agent (single instance) ─────────────────────────────────────
  clif-triage-agent:
    container_name: clif-triage-agent
    build:
      context: ./agents/triage
      dockerfile: Dockerfile
    environment:
      KAFKA_BROKERS: "redpanda01:9092"
      CONSUMER_GROUP_ID: "clif-triage-agent"
      INPUT_TOPICS: "raw-logs,security-events,process-events,network-events"
      TOPIC_TEMPLATED_LOGS: "templated-logs"
      TOPIC_TRIAGE_SCORES: "triage-scores"
      TOPIC_ANOMALY_ALERTS: "anomaly-alerts"
      TOPIC_HUNTER_TASKS: "hunter-tasks"
      TOPIC_DEAD_LETTER: "dead-letter"
      CLICKHOUSE_HOST: clickhouse01
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clif_admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clif_secure_password_change_me}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-clif_logs}
      DRAIN3_DEPTH: 4
      DRAIN3_SIM_TH: 0.4
      DRAIN3_MAX_CHILDREN: 100
      DRAIN3_MAX_CLUSTERS: 1024
      DRAIN3_CONFIG_PATH: /app/drain3.ini
      DRAIN3_STATE_PATH: /app/drain3_state.bin
      MODEL_DIR: /models
      MODEL_LGBM_PATH: /models/lgbm_v2.0.0.onnx
      MODEL_EIF_PATH: /models/eif_v2.0.0.pkl
      MODEL_EIF_THRESHOLD_PATH: /models/eif_threshold.npy
      MODEL_EIF_CALIBRATION_PATH: /models/eif_calibration.npz
      MODEL_ARF_CHECKPOINT: /models/arf_v2.0.0.pkl
      FEATURE_COLS_PATH: /models/feature_cols.pkl
      MANIFEST_PATH: /models/manifest.json
      SCORE_WEIGHTS: "lgbm=0.60,eif=0.15,arf=0.25"
      DEFAULT_SUSPICIOUS_THRESHOLD: "0.39"
      DEFAULT_ANOMALOUS_THRESHOLD: "0.85"
      DISAGREEMENT_THRESHOLD: "0.30"
      FEATURE_STALENESS_TIMEOUT_SEC: "300"
      EIF_ANOMALY_OVERRIDE_THRESHOLD: "0.65"
      EIF_ANOMALY_OVERRIDE_FLOOR: "0.45"
      BATCH_SIZE: "1000"
      INFERENCE_WORKERS: "2"
      CONN_TIME_WINDOW_SEC: "2.0"
      CONN_HOST_WINDOW_SIZE: "100"
      ARF_WARM_RESTART: "true"
      ARF_REPLAY_HOURS: "24"
      ARF_REPLAY_MAX_ROWS: "50000"
      ARF_STREAM_CSV_PATH: "/models/features_arf_stream_features.csv"
      ARF_N_MODELS: "10"
      ARF_ADWIN_DELTA: "0.002"
      ARF_ADWIN_WARNING_DELTA: "0.01"
      ARF_SEED: "42"
      ARF_CONFIDENCE_RAMP_SAMPLES: "10000"
      ARF_LABEL_SOURCE: "lgbm_pseudo"
      ARF_PSEUDO_LABEL_HIGH: "0.80"
      ARF_PSEUDO_LABEL_LOW: "0.20"
      SELFTEST_ENABLED: "true"
      STARTUP_HEALTH_RETRIES: "30"
      STARTUP_HEALTH_DELAY_SEC: "2.0"
      LOG_LEVEL: INFO
    volumes:
      - ./agents/triage/models:/models:ro
    ports:
      - "8300:8300"
    depends_on:
      redpanda01:
        condition: service_healthy
      clickhouse01:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    networks:
      - clif-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8300/health')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M

  # ─── LanceDB Vector Service ─────────────────────────────────────────────
  lancedb-service:
    container_name: lancedb-service
    hostname: lancedb-service
    build:
      context: ./services/lancedb-service
      dockerfile: Dockerfile
    environment:
      LANCEDB_PATH: /data/lancedb
      EMBED_MODEL: all-MiniLM-L6-v2
      PORT: "8100"
      LOG_LEVEL: INFO
    volumes:
      - lancedb_data:/data/lancedb
    ports:
      - "8100:8100"
    networks:
      - clif-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8100/health')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 640M

  # ─── Hunter Agent ───────────────────────────────────────────────────────
  clif-hunter-agent:
    container_name: clif-hunter-agent
    hostname: clif-hunter-agent
    build:
      context: ./agents/hunter
      dockerfile: Dockerfile
    environment:
      KAFKA_BROKERS: "redpanda01:9092"
      CONSUMER_GROUP_ID: "clif-hunter-agent"
      TOPIC_HUNTER_TASKS: "hunter-tasks"
      TOPIC_HUNTER_RESULTS: "hunter-results"
      TOPIC_DEAD_LETTER: "dead-letter"
      CLICKHOUSE_HOST: clickhouse01
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clif_admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clif_secure_password_change_me}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-clif_logs}
      LANCEDB_URL: "http://lancedb-service:8100"
      LANCEDB_TIMEOUT_SEC: "2.0"
      LANCEDB_BACKOFF_SEC: "60.0"
      HUNTER_PORT: "8400"
      HUNTER_SCORE_GATE: "0.65"
      INVESTIGATION_WINDOW_MIN: "15"
      SIGMA_RULES_DIR: "/app/sigma/rules"
      CATBOOST_MODEL_PATH: "/app/models/hunter_catboost.cbm"
      MIN_TRAINING_SAMPLES: "100"
      RETRAIN_INTERVAL_SEC: "21600"
      SPC_BASELINE_REFRESH_SEC: "60"
      SPC_WINDOW_HOURS: "24"
      BATCH_SIZE: "100"
      LOG_LEVEL: INFO
    volumes:
      - hunter_models:/app/models
    ports:
      - "8400:8400"
    depends_on:
      redpanda01:
        condition: service_healthy
      clickhouse01:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
      clif-triage-agent:
        condition: service_healthy
      lancedb-service:
        condition: service_healthy
    networks:
      - clif-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8400/health')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M
