# =============================================================================
# CLIF — Prometheus Configuration
# =============================================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:

  # ── ClickHouse Node 1 ────────────────────────────────────────────────────
  - job_name: "clickhouse-01"
    static_configs:
      - targets: ["clickhouse01:9363"]
        labels:
          node: "clickhouse01"
          role: "replica_01"
    metrics_path: /metrics

  # ── ClickHouse Node 2 ────────────────────────────────────────────────────
  - job_name: "clickhouse-02"
    static_configs:
      - targets: ["clickhouse02:9363"]
        labels:
          node: "clickhouse02"
          role: "replica_02"
    metrics_path: /metrics

  # ── Redpanda Brokers ─────────────────────────────────────────────────────
  - job_name: "redpanda"
    static_configs:
      - targets:
          - "redpanda01:9644"
          - "redpanda02:9644"
          - "redpanda03:9644"
    metrics_path: /public_metrics

  # ── MinIO ────────────────────────────────────────────────────────────────
  - job_name: "minio"
    static_configs:
      - targets: ["minio1:9000"]
    metrics_path: /minio/v2/metrics/cluster

  # ── Prometheus self ──────────────────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
