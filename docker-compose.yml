# =============================================================================
# CLIF Storage Infrastructure — Docker Compose
# =============================================================================
# Start:   docker-compose up -d
# Destroy: docker-compose down -v
# =============================================================================

# ── Logging defaults (prevents disk exhaustion) ──────────────────────────────
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  clif-frontend:
    driver: bridge
  clif-backend:
    driver: bridge
  clif-storage:
    driver: bridge

# ── Persistent volumes ───────────────────────────────────────────────────────
volumes:
  clickhouse01_data:
  clickhouse02_data:
  clickhouse_keeper_data:
  redpanda01_data:
  redpanda02_data:
  redpanda03_data:
  minio1_data:
  minio2_data:
  minio3_data:
  vector_data:
  prometheus_data:
  grafana_data:
  lancedb_data:

# ── Services ─────────────────────────────────────────────────────────────────
services:

  # =========================================================================
  # ClickHouse Keeper (lightweight ZooKeeper replacement for replication)
  # =========================================================================
  clickhouse-keeper:
    image: clickhouse/clickhouse-keeper:24.8
    container_name: clif-clickhouse-keeper
    hostname: clickhouse-keeper
    ports:
      - "${ZOOKEEPER_PORT:-12181}:2181"
    volumes:
      - clickhouse_keeper_data:/var/lib/clickhouse-keeper
      - ./clickhouse/keeper_config.xml:/etc/clickhouse-keeper/keeper_config.xml:ro
    networks:
      - clif-storage
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-keeper-client -h localhost -p 2181 -q 'ruok' | grep -q imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # =========================================================================
  # ClickHouse Node 1 (shard_01 / replica_01)
  # =========================================================================
  clickhouse01:
    image: clickhouse/clickhouse-server:24.8
    container_name: clif-clickhouse01
    hostname: clickhouse01
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clif_admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clif_secure_password_change_me}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-clif_logs}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-clif_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-clif_minio_secret_change_me}
    volumes:
      - clickhouse01_data:/var/lib/clickhouse
      - ./clickhouse/node01_config.xml:/etc/clickhouse-server/config.d/clusters.xml:ro
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/users.xml:ro
      - ./clickhouse/storage_policy.xml:/etc/clickhouse-server/config.d/storage_policy.xml:ro
      - ./clickhouse/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    depends_on:
      clickhouse-keeper:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - clif-backend
      - clif-storage
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user ${CLICKHOUSE_USER:-clif_admin} --password ${CLICKHOUSE_PASSWORD:-clif_secure_password_change_me} --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  # =========================================================================
  # ClickHouse Node 2 (shard_01 / replica_02)
  # =========================================================================
  clickhouse02:
    image: clickhouse/clickhouse-server:24.8
    container_name: clif-clickhouse02
    hostname: clickhouse02
    ports:
      - "8124:8123"
      - "9001:9000"
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clif_admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clif_secure_password_change_me}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-clif_logs}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-clif_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-clif_minio_secret_change_me}
    volumes:
      - clickhouse02_data:/var/lib/clickhouse
      - ./clickhouse/node02_config.xml:/etc/clickhouse-server/config.d/clusters.xml:ro
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/users.xml:ro
      - ./clickhouse/storage_policy.xml:/etc/clickhouse-server/config.d/storage_policy.xml:ro
      - ./clickhouse/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    depends_on:
      clickhouse-keeper:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - clif-backend
      - clif-storage
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user ${CLICKHOUSE_USER:-clif_admin} --password ${CLICKHOUSE_PASSWORD:-clif_secure_password_change_me} --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  # =========================================================================
  # Redpanda Broker 1
  # =========================================================================
  redpanda01:
    image: redpandadata/redpanda:v24.2.8
    container_name: clif-redpanda01
    hostname: redpanda01
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda01:9092,external://localhost:19092
      - --rpc-addr 0.0.0.0:33145
      - --advertise-rpc-addr redpanda01:33145
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda01:8082,external://localhost:18082
      - --smp 2
      - --memory 3G
      - --reserve-memory 200M
      - --default-log-level=warn
      - --seeds redpanda01:33145
    ports:
      - "19092:19092"   # Kafka external
      - "18082:18082"   # Pandaproxy external
      - "${REDPANDA_ADMIN_PORT:-9644}:9644"   # Admin API
    volumes:
      - redpanda01_data:/var/lib/redpanda/data
    networks:
      - clif-backend
      - clif-storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9644/v1/status/ready || rpk brokers list | grep -q '9092'"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 3G

  # =========================================================================
  # Redpanda Broker 2
  # =========================================================================
  redpanda02:
    image: redpandadata/redpanda:v24.2.8
    container_name: clif-redpanda02
    hostname: redpanda02
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:29092
      - --advertise-kafka-addr internal://redpanda02:9092,external://localhost:29092
      - --rpc-addr 0.0.0.0:33145
      - --advertise-rpc-addr redpanda02:33145
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:28082
      - --advertise-pandaproxy-addr internal://redpanda02:8082,external://localhost:28082
      - --smp 2
      - --memory 3G
      - --reserve-memory 200M
      - --default-log-level=warn
      - --seeds redpanda01:33145
    ports:
      - "29092:29092"
      - "28082:28082"
    volumes:
      - redpanda02_data:/var/lib/redpanda/data
    networks:
      - clif-backend
      - clif-storage
    depends_on:
      redpanda01:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9644/v1/status/ready || rpk brokers list | grep -q '9092'"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 3G

  # =========================================================================
  # Redpanda Broker 3
  # =========================================================================
  redpanda03:
    image: redpandadata/redpanda:v24.2.8
    container_name: clif-redpanda03
    hostname: redpanda03
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:39092
      - --advertise-kafka-addr internal://redpanda03:9092,external://localhost:39092
      - --rpc-addr 0.0.0.0:33145
      - --advertise-rpc-addr redpanda03:33145
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:38082
      - --advertise-pandaproxy-addr internal://redpanda03:8082,external://localhost:38082
      - --smp 2
      - --memory 3G
      - --reserve-memory 200M
      - --default-log-level=warn
      - --seeds redpanda01:33145
    ports:
      - "39092:39092"
      - "38082:38082"
    volumes:
      - redpanda03_data:/var/lib/redpanda/data
    networks:
      - clif-backend
      - clif-storage
    depends_on:
      redpanda01:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9644/v1/status/ready || rpk brokers list | grep -q '9092'"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 3G

  # =========================================================================
  # Redpanda Console (web UI)
  # =========================================================================
  redpanda-console:
    image: redpandadata/console:v2.7.2
    container_name: clif-redpanda-console
    hostname: redpanda-console
    ports:
      - "8080:8080"
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
    volumes:
      - ./redpanda/console-config.yml:/tmp/config.yml:ro
    networks:
      - clif-frontend
      - clif-backend
    depends_on:
      redpanda01:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/admin/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging: *default-logging
    restart: unless-stopped

  # =========================================================================
  # MinIO Node 1
  # =========================================================================
  minio1:
    image: minio/minio:RELEASE.2024-08-29T01-40-52Z
    container_name: clif-minio1
    hostname: minio1
    command: server http://minio{1...3}/data --console-address ":9001"
    ports:
      - "${MINIO_DATA_PORT:-9002}:9000"
      - "${MINIO_CONSOLE_PORT:-9003}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-clif_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-clif_minio_secret_change_me}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - minio1_data:/data
    networks:
      - clif-storage
      - clif-frontend
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # =========================================================================
  # MinIO Node 2
  # =========================================================================
  minio2:
    image: minio/minio:RELEASE.2024-08-29T01-40-52Z
    container_name: clif-minio2
    hostname: minio2
    command: server http://minio{1...3}/data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-clif_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-clif_minio_secret_change_me}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - minio2_data:/data
    networks:
      - clif-storage
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # =========================================================================
  # MinIO Node 3
  # =========================================================================
  minio3:
    image: minio/minio:RELEASE.2024-08-29T01-40-52Z
    container_name: clif-minio3
    hostname: minio3
    command: server http://minio{1...3}/data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-clif_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-clif_minio_secret_change_me}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - minio3_data:/data
    networks:
      - clif-storage
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # =========================================================================
  # MinIO bucket initialiser (creates buckets then exits)
  # =========================================================================
  minio-init:
    image: minio/mc:RELEASE.2024-08-26T10-49-58Z
    container_name: clif-minio-init
    depends_on:
      minio1:
        condition: service_healthy
    entrypoint: |
      /bin/sh -c "
        mc alias set clif http://minio1:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing clif/${MINIO_BUCKET_COLD:-clif-cold-logs};
        mc mb --ignore-existing clif/${MINIO_BUCKET_BACKUPS:-clif-backups};
        mc mb --ignore-existing clif/${MINIO_BUCKET_EVIDENCE:-clif-evidence-archive};
        echo 'MinIO buckets initialised.';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-clif_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-clif_minio_secret_change_me}
    networks:
      - clif-storage

  # =========================================================================
  # Redpanda topic initialiser (creates topics then exits)
  # =========================================================================
  redpanda-init:
    image: redpandadata/redpanda:v24.2.8
    container_name: clif-redpanda-init
    depends_on:
      redpanda01:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        BROKER="redpanda01:9092"
        PARTITIONS=$${REDPANDA_PARTITIONS:-12}
        RF=$${REDPANDA_REPLICATION_FACTOR:-3}
        RETENTION=$${REDPANDA_LOG_RETENTION_MS:-604800000}
        AGENT_P=$$(( PARTITIONS / 2 ))
        [ "$$AGENT_P" -lt 3 ] && AGENT_P=3

        echo "── Creating ingestion topics ($$PARTITIONS partitions) ──"
        for TOPIC in raw-logs security-events process-events network-events; do
          rpk topic create "$$TOPIC" \
            --brokers "$$BROKER" \
            --partitions "$$PARTITIONS" \
            --replicas "$$RF" \
            --topic-config retention.ms="$$RETENTION" \
            --topic-config cleanup.policy=delete \
            --topic-config compression.type=producer \
            --topic-config max.message.bytes=10485760 || true
          echo "  ✔ topic $$TOPIC ready"
        done

        echo "── Creating triage pipeline topics ($$PARTITIONS partitions) ──"
        for TOPIC in templated-logs triage-scores anomaly-alerts; do
          rpk topic create "$$TOPIC" \
            --brokers "$$BROKER" \
            --partitions "$$PARTITIONS" \
            --replicas "$$RF" \
            --topic-config retention.ms="$$RETENTION" \
            --topic-config cleanup.policy=delete \
            --topic-config compression.type=producer \
            --topic-config max.message.bytes=10485760 || true
          echo "  ✔ topic $$TOPIC ready"
        done

        echo "── Creating agent pipeline topics ($$AGENT_P partitions) ──"
        for TOPIC in hunter-tasks hunter-results verifier-tasks verifier-results; do
          rpk topic create "$$TOPIC" \
            --brokers "$$BROKER" \
            --partitions "$$AGENT_P" \
            --replicas "$$RF" \
            --topic-config retention.ms="$$RETENTION" \
            --topic-config cleanup.policy=delete \
            --topic-config compression.type=producer \
            --topic-config max.message.bytes=10485760 || true
          echo "  ✔ topic $$TOPIC ready"
        done

        echo "── Creating operational topics (3 partitions) ──"
        for TOPIC in feedback-labels dead-letter pipeline-commands; do
          rpk topic create "$$TOPIC" \
            --brokers "$$BROKER" \
            --partitions 3 \
            --replicas "$$RF" \
            --topic-config retention.ms="$$((RETENTION * 4))" \
            --topic-config cleanup.policy=delete \
            --topic-config compression.type=producer \
            --topic-config max.message.bytes=10485760 || true
          echo "  ✔ topic $$TOPIC ready"
        done

        rpk topic list --brokers "$$BROKER"
        echo "All CLIF topics initialised (14 topics)."
    environment:
      REDPANDA_PARTITIONS: ${REDPANDA_PARTITIONS:-12}
      REDPANDA_REPLICATION_FACTOR: ${REDPANDA_REPLICATION_FACTOR:-3}
      REDPANDA_LOG_RETENTION_MS: ${REDPANDA_LOG_RETENTION_MS:-604800000}
    networks:
      - clif-backend

  # =========================================================================
  # CLIF Consumer 1 (Redpanda → ClickHouse pipeline)
  # =========================================================================
  clif-consumer:
    build:
      context: ./consumer
      dockerfile: Dockerfile
    container_name: clif-consumer
    hostname: clif-consumer
    environment:
      KAFKA_BROKERS: redpanda01:9092,redpanda02:9092,redpanda03:9092
      CLICKHOUSE_HOST: clickhouse01
      CLICKHOUSE_ALT_HOSTS: clickhouse02:9000
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clif_admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clif_secure_password_change_me}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-clif_logs}
      CONSUMER_GROUP_ID: ${CONSUMER_GROUP_ID:-clif-clickhouse-consumer}
      CONSUMER_BATCH_SIZE: ${CONSUMER_BATCH_SIZE:-500000}
      CONSUMER_FLUSH_INTERVAL_SEC: ${CONSUMER_FLUSH_INTERVAL_SEC:-0.3}
      CONSUMER_MAX_RETRIES: ${CONSUMER_MAX_RETRIES:-5}
      CONSUMER_POLL_BATCH: ${CONSUMER_POLL_BATCH:-50000}
      CONSUMER_FLUSH_WORKERS: ${CONSUMER_FLUSH_WORKERS:-6}
      LOG_LEVEL: INFO
    depends_on:
      clickhouse01:
        condition: service_healthy
      redpanda01:
        condition: service_healthy
    networks:
      - clif-backend
      - clif-storage
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"clickhouse01\",9000)); s.close()' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  # ── Consumer-2: horizontal scaling for higher E2E throughput ──
  # Re-enabled after Redpanda memory optimization freed 2.5GB.
  # Same consumer group → Redpanda distributes partitions across both.
  clif-consumer-2:
    build:
      context: ./consumer
      dockerfile: Dockerfile
    container_name: clif-consumer-2
    hostname: clif-consumer-2
    environment:
      KAFKA_BROKERS: redpanda01:9092,redpanda02:9092,redpanda03:9092
      CLICKHOUSE_HOST: clickhouse01
      CLICKHOUSE_ALT_HOSTS: clickhouse02:9000
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clif_admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clif_secure_password_change_me}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-clif_logs}
      CONSUMER_GROUP_ID: ${CONSUMER_GROUP_ID:-clif-clickhouse-consumer}
      CONSUMER_BATCH_SIZE: ${CONSUMER_BATCH_SIZE:-500000}
      CONSUMER_FLUSH_INTERVAL_SEC: ${CONSUMER_FLUSH_INTERVAL_SEC:-0.3}
      CONSUMER_MAX_RETRIES: ${CONSUMER_MAX_RETRIES:-5}
      CONSUMER_POLL_BATCH: ${CONSUMER_POLL_BATCH:-50000}
      CONSUMER_FLUSH_WORKERS: ${CONSUMER_FLUSH_WORKERS:-6}
      LOG_LEVEL: INFO
    depends_on:
      clickhouse01:
        condition: service_healthy
      redpanda01:
        condition: service_healthy
    networks:
      - clif-backend
      - clif-storage
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"clickhouse01\",9000)); s.close()' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  # ── Consumer-3: 3rd horizontal consumer for 70-100K+ E2E throughput ──
  # 12 partitions / 3 consumers = 4 partitions each (optimal distribution)
  clif-consumer-3:
    build:
      context: ./consumer
      dockerfile: Dockerfile
    container_name: clif-consumer-3
    hostname: clif-consumer-3
    environment:
      KAFKA_BROKERS: redpanda01:9092,redpanda02:9092,redpanda03:9092
      CLICKHOUSE_HOST: clickhouse01
      CLICKHOUSE_ALT_HOSTS: clickhouse02:9000
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clif_admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clif_secure_password_change_me}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-clif_logs}
      CONSUMER_GROUP_ID: ${CONSUMER_GROUP_ID:-clif-clickhouse-consumer}
      CONSUMER_BATCH_SIZE: ${CONSUMER_BATCH_SIZE:-500000}
      CONSUMER_FLUSH_INTERVAL_SEC: ${CONSUMER_FLUSH_INTERVAL_SEC:-0.3}
      CONSUMER_MAX_RETRIES: ${CONSUMER_MAX_RETRIES:-5}
      CONSUMER_POLL_BATCH: ${CONSUMER_POLL_BATCH:-50000}
      CONSUMER_FLUSH_WORKERS: ${CONSUMER_FLUSH_WORKERS:-6}
      LOG_LEVEL: INFO
    depends_on:
      clickhouse01:
        condition: service_healthy
      redpanda01:
        condition: service_healthy
    networks:
      - clif-backend
      - clif-storage
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"clickhouse01\",9000)); s.close()' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  # =========================================================================
  # Vector — Log Aggregation & CCS Normalization Pipeline
  # =========================================================================
  # Collects logs from syslog, HTTP, Docker, files, and journald.
  # Normalizes all events to CLIF Common Schema (CCS) via VRL transforms.
  # Routes classified events to topic-specific Redpanda sinks.
  clif-vector:
    build:
      context: ./vector
      dockerfile: Dockerfile
      target: development
    container_name: clif-vector
    hostname: clif-vector
    ports:
      - "${VECTOR_SYSLOG_PORT:-1514}:1514"       # Syslog TCP+UDP
      - "${VECTOR_SYSLOG_PORT:-1514}:1514/udp"   # Syslog UDP
      - "${VECTOR_API_PORT:-8686}:8686"           # Vector API
      - "${VECTOR_HTTP_PORT:-8687}:8687"          # HTTP JSON ingest
      - "${VECTOR_TCP_JSON_PORT:-9514}:9514"      # TCP NDJSON ingest (high-throughput)
      - "${VECTOR_STATSD_PORT:-8125}:8125/udp"   # StatsD metrics
      - "${VECTOR_PROM_PORT:-9598}:9598"          # Prometheus exporter
    environment:
      VECTOR_KAFKA_BROKERS: redpanda01:9092,redpanda02:9092,redpanda03:9092
      VECTOR_LOG: ${VECTOR_LOG_LEVEL:-info}
      VECTOR_THREADS: ${VECTOR_THREADS:-8}
    volumes:
      - vector_data:/var/lib/vector
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log/host:ro
    depends_on:
      redpanda01:
        condition: service_healthy
    networks:
      - clif-backend
      - clif-storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8686/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 8G
        reservations:
          cpus: '4'
          memory: 4G

  # =========================================================================
  # Prometheus
  # =========================================================================
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: clif-prometheus
    hostname: prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks:
      - clif-frontend
      - clif-storage
      - clif-backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # =========================================================================
  # Grafana
  # =========================================================================
  grafana:
    image: grafana/grafana:11.1.4
    container_name: clif-grafana
    hostname: grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-clif_grafana_change_me}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/clif-overview.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/clif-overview.json:ro
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./monitoring/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
    networks:
      - clif-frontend
      - clif-storage
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  # =========================================================================
  # Merkle Evidence Chain Service
  # =========================================================================
  clif-merkle:
    build:
      context: ./merkle-service
      dockerfile: Dockerfile
    container_name: clif-merkle
    hostname: clif-merkle
    environment:
      CLICKHOUSE_HOST: clickhouse01
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clif_admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clif_secure_password_change_me}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-clif_logs}
      MINIO_ENDPOINT: http://minio1:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-clif_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-clif_minio_secret_change_me}
      MINIO_BUCKET_EVIDENCE: ${MINIO_BUCKET_EVIDENCE:-clif-evidence-archive}
      MERKLE_BATCH_WINDOW: ${MERKLE_BATCH_WINDOW:-1800}
      MERKLE_DAEMON_INTERVAL: ${MERKLE_DAEMON_INTERVAL:-30}
      LOG_LEVEL: INFO
    depends_on:
      clickhouse01:
        condition: service_healthy
      minio1:
        condition: service_healthy
    networks:
      - clif-backend
      - clif-storage
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"clickhouse01\",9000)); s.close()' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # =========================================================================
  # LanceDB — Semantic Vector Search & RAG Engine
  # Disabled during pipeline testing. Enable with: docker compose --profile full up
  # =========================================================================
  lancedb:
    container_name: clif-lancedb
    profiles: [full]
    build:
      context: ./lancedb-service
      dockerfile: Dockerfile
    environment:
      LANCEDB_PATH: /data/lancedb
      EMBEDDING_MODEL: all-MiniLM-L6-v2
      EMBEDDING_BATCH_SIZE: 256
      EMBEDDING_DIM: 384
      CLICKHOUSE_HOST: clickhouse01
      CLICKHOUSE_PORT: ${CLICKHOUSE_NATIVE_PORT:-9000}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clif_admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clif_secure_password_change_me}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-clif_logs}
      SYNC_INTERVAL_SEC: 30
      SYNC_BATCH_SIZE: 1000
      API_HOST: 0.0.0.0
      API_PORT: 8100
      LOG_LEVEL: INFO
      CORS_ORIGINS: "http://localhost:3001,http://clif-dashboard:3001"
    ports:
      - "8100:8100"
    volumes:
      - lancedb_data:/data/lancedb
    depends_on:
      clickhouse01:
        condition: service_healthy
    networks:
      - clif-backend
      - clif-frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8100/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 1G
  # =========================================================================
  # Triage Agent — 3-Model ML Ensemble (LightGBM ONNX + EIF + River ARF)
  # =========================================================================
  # Consumes from: raw-logs, security-events, process-events, network-events
  # Produces to:   triage-scores, anomaly-alerts (dead-letter on error)
  # Writes to:     ClickHouse arf_replay_buffer (warm restart + online learning)
  # Health:        ClickHouse + Kafka gates, startup self-test, /health on 8300
  # =========================================================================
  clif-triage-agent:
    container_name: clif-triage-agent
    build:
      context: ./agents/triage
      dockerfile: Dockerfile
    environment:
      # ── Redpanda connectivity ──
      KAFKA_BROKERS: "redpanda01:9092,redpanda02:9092,redpanda03:9092"
      CONSUMER_GROUP_ID: "clif-triage-agent"
      # ── Input topics (same 4 ingestion topics) ──
      INPUT_TOPICS: "raw-logs,security-events,process-events,network-events"
      # ── Output topics ──
      TOPIC_TEMPLATED_LOGS: "templated-logs"
      TOPIC_TRIAGE_SCORES: "triage-scores"
      TOPIC_ANOMALY_ALERTS: "anomaly-alerts"
      TOPIC_DEAD_LETTER: "dead-letter"
      # ── ClickHouse (feature queries + score persistence) ──
      CLICKHOUSE_HOST: clickhouse01
      CLICKHOUSE_PORT: ${CLICKHOUSE_NATIVE_PORT:-9000}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clif_admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clif_secure_password_change_me}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-clif_logs}
      # ── Drain3 configuration ──
      DRAIN3_DEPTH: 4
      DRAIN3_SIM_TH: 0.4
      DRAIN3_MAX_CHILDREN: 100
      DRAIN3_MAX_CLUSTERS: 1024
      DRAIN3_CONFIG_PATH: /app/drain3.ini
      DRAIN3_STATE_PATH: /app/drain3_state.bin
      # ── ML model paths ──
      MODEL_DIR: /models
      MODEL_LGBM_PATH: /models/lgbm_v1.0.0.onnx
      MODEL_EIF_PATH: /models/eif_v1.0.0.pkl
      MODEL_EIF_THRESHOLD_PATH: /models/eif_threshold.npy
      MODEL_ARF_CHECKPOINT: /models/arf_v1.0.0.pkl
      FEATURE_COLS_PATH: /models/feature_cols.pkl
      MANIFEST_PATH: /models/manifest.json
      # ── Scoring ──
      SCORE_WEIGHTS: "lgbm=0.50,eif=0.30,arf=0.20"
      DEFAULT_SUSPICIOUS_THRESHOLD: "0.70"
      DEFAULT_ANOMALOUS_THRESHOLD: "0.90"
      DISAGREEMENT_THRESHOLD: "0.35"
      FEATURE_STALENESS_TIMEOUT_SEC: "300"
      # ── Performance ──
      BATCH_SIZE: "1000"
      INFERENCE_WORKERS: "4"
      CONN_TIME_WINDOW_SEC: "2.0"
      CONN_HOST_WINDOW_SIZE: "100"
      # ── ARF Warm Restart ──
      ARF_WARM_RESTART: "true"
      ARF_REPLAY_HOURS: "24"
      ARF_REPLAY_MAX_ROWS: "50000"
      ARF_STREAM_CSV_PATH: "/models/features_arf_stream_features.csv"
      ARF_N_MODELS: "10"
      ARF_ADWIN_DELTA: "0.002"
      ARF_ADWIN_WARNING_DELTA: "0.01"
      ARF_SEED: "42"
      # ── Health / Self-test ──
      SELFTEST_ENABLED: "true"
      STARTUP_HEALTH_RETRIES: "30"
      STARTUP_HEALTH_DELAY_SEC: "2.0"
      LOG_LEVEL: INFO
    volumes:
      - ./agents/triage/models:/models:ro
    ports:
      - "8300:8300"
    depends_on:
      redpanda01:
        condition: service_healthy
      clickhouse01:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    networks:
      - clif-backend
      - clif-storage
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8300/health')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    logging: *default-logging
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G

  # ── Triage Agent 2: Horizontal scaling for 200k EPS triage throughput ──
  # Same consumer group → Redpanda distributes partitions across all agents.
